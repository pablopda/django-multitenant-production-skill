name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke-run bundled scripts
        run: |
          python scripts/tenant_static_audit.py --help > /dev/null
          python scripts/scaffold_django_tenants_app.py --help > /dev/null
          python scripts/generate_tenant_isolation_tests.py --help > /dev/null
          python scripts/tenant_static_audit.py --root . --format json > /dev/null
